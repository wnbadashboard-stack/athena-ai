<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Athena Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<h1>ATHENA AI</h1>

<h2 id="welcome">
Welcome
</h2>

<div class="card">

<h3>Today's Slate</h3>

<p>Games: 5</p>

<p>Slate Lock:
7:00 PM EST</p>

</div>

<div class="card">

<h3>AI Tools</h3>

<button id="optimizer">
Build Lineup
</button>

<button id="research">
Player Research
</button>

<button id="cheatsheet">
Cheat Sheet
</button>

<button id="injuries">
Injury Tracker
</button>

<button id="lateswap">
Late Swap
</button>

</div>

<div class="card">

<h3>Activity</h3>

<p>No lineups built yet.</p>

</div>

<button id="logout">
Logout
</button>

</div>

<script type="module" src="dashboard.js"></script>

</body>

</html>
