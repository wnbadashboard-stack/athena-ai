<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Athena</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

<h1>ATHENA</h1>

<p>Create your Athena account.</p>

<input
type="text"
placeholder="Full Name"
id="name">

<input
type="email"
placeholder="Email"
id="email">

<input
type="password"
placeholder="Password"
id="password">

<input
type="password"
placeholder="Confirm Password"
id="confirmPassword">

<button id="signup">

Create Account

</button>

<p>

Already have an account?

<a href="login.html">Sign In</a>

</p>

</div>

<script type="module" src="./js/signup.js"></script>

</body>

</html>
