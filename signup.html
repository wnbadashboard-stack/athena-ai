<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Athena</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

    <h1>ATHENA AI</h1>

    <h2>Create Your Account</h2>

    <p>
        Create your Athena Pro account to access the optimizer.
    </p>

    <input
        type="email"
        id="email"
        placeholder="Email Address"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button id="signup">
        Create Account
    </button>

    <p style="margin-top:20px;">

        Already have an account?

        <a href="login.html">

            Sign In

        </a>

    </p>

</div>

<script type="module" src="./auth.js"></script>

</body>

</html>
