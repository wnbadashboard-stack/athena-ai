<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Athena | Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

    <h1>ATHENA</h1>

    <h2>Welcome Back</h2>

    <p>
        Win Before Tipoff.
    </p>

    <input
        type="email"
        id="email"
        placeholder="Email Address"
        autocomplete="email">

    <input
        type="password"
        id="password"
        placeholder="Password"
        autocomplete="current-password">

    <button id="login">
        Sign In
    </button>

    <button id="google">
        Continue with Google
    </button>

    <p class="signup-text">
        New to Athena?
    </p>

    <button id="signup">
        Create Free Account
    </button>

    <hr>

    <p class="copyright">
        © 2026 Athena Technologies
    </p>

</div>

<!-- IMPORTANT -->
<!-- auth.js imports firebase.js automatically -->
<script type="module" src="./auth.js"></script>

</body>

</html>
